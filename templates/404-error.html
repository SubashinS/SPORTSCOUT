{% extends "base.html" %}

{% block content %}
<div class="container text-center mt-5">
    <h1 class="display-1 text-warning neon-404">404</h1>
    <h2 class="mb-4 neon-text">Page Not Found</h2>
    <p class="text-white-50 mb-4">The requested URL was not found on this server.</p>
    <div class="error-animation mb-4">
        <i class="fas fa-search fa-3x text-accent neon-icon"></i>
    </div>
    <a href="{{ url_for('home') }}" class="btn neon-btn-primary btn-lg">
        <i class="fas fa-home me-2"></i>Go Home
    </a>
</div>

<style>
.neon-404 {
    font-size: 8rem;
    text-shadow: 0 0 20px #ffc107, 0 0 40px #ffc107;
    animation: pulse404 2s ease-in-out infinite;
}

@keyframes pulse404 {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
}

.neon-text {
    text-shadow: 0 0 15px var(--accent-color);
    color: var(--accent-color);
}

.neon-icon {
    filter: drop-shadow(0 0 10px currentColor);
    animation: searchSpin 3s linear infinite;
}

@keyframes searchSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.error-animation {
    animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-30px); }
    60% { transform: translateY(-15px); }
}

.neon-btn-primary {
    background: linear-gradient(45deg, var(--accent-color), var(--neon-color, #00ff41));
    border: none;
    color: white;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
    transition: all 0.3s ease;
    padding: 12px 30px;
    border-radius: 25px;
}

.neon-btn-primary:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(243, 156, 18, 0.6);
    background: linear-gradient(45deg, var(--neon-color, #00ff41), var(--accent-color));
}

:root {
    --accent-color: #f39c12;
    --neon-color: #00ff41;
}
</style>
{% endblock %}
